name: Deploy FormAuto Hub

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-formauto-hub
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: 1122
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            cd ${{ secrets.DEPLOY_PATH }}

            git fetch origin main
            git reset --hard origin/main

            dotnet restore FormAutoHub.sln
            dotnet publish src/FormAutoHub.Api/FormAutoHub.Api.csproj \
              --configuration Release \
              --output publish/api

            cd apps/web
            npm ci
            npm run build

            sudo systemctl restart formauto-api
            sudo systemctl restart formauto-web

            sudo systemctl status formauto-api --no-pager
            sudo systemctl status formauto-web --no-pager
